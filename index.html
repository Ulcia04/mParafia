<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="utf-8" />
  <title>mParafia</title>

  <meta name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="Aplikacja Twojej Parafii" />

  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#7F451D" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FFE9D4" />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="mParafia" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <link rel="icon" href="./assets/icons/512x512.png" type="image/png" />
  <link rel="manifest" href="./manifest.json" />

  <link rel="stylesheet" media="(prefers-color-scheme:light)"
    href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.16.0/dist/themes/light.css">
  <link rel="stylesheet" media="(prefers-color-scheme:dark)"
    href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.16.0/dist/themes/dark.css"
    onload="document.documentElement.classList.add('sl-theme-dark');">

  <script type="module">
    import { setBasePath } from 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.16.0/dist/utilities/base-path.js';
    setBasePath('https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.16.0/cdn/');
  </script>

  <script type="module" src="/src/app-index.ts"></script>
</head>

<body>
  <app-index></app-index>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>

</html>
