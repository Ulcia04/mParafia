  <link rel="manifest" href="/mParafia/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/mParafia/registerSW.js"></script></head>
  <body>
    <app-index></app-index>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/mParafia/sw.js', {
              scope: '/mParafia/'
            })
            .then((registration) => {
              console.log('Sukces! Service Worker działa w zasięgu:', registration.scope);
            })
            .catch((error) => {
              console.error('Błąd instalacji Service Workera:', error);
            });
        });
      }
    </script>
