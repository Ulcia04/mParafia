<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="utf-8" />
  <title>mParafia</title>
  <meta name="description" content="Aplikacja Twojej Parafii" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FFE9D4" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#7F451D" />

  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/icons/512x512.png" type="image/png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="mParafia" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./assets/icons/512x512.png" />

  <link rel="stylesheet" media="(prefers-color-scheme:light)"
    href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.16.0/dist/themes/light.css">
  <link rel="stylesheet" media="(prefers-color-scheme:dark)"
    href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.16.0/dist/themes/dark.css"
    onload="document.documentElement.classList.add('sl-theme-dark');">

  <script type="module" src="/src/app-index.ts"></script>
  <style>
    html, body {
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>

</head>
<body>
  <app-index></app-index>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/mParafia/sw.js', { scope: '/mParafia/' })
          .then((registration) => {
            console.log('Sukces! Service Worker działa w zasięgu:', registration.scope);
          })
          .catch((error) => {
            console.error('Błąd instalacji Service Workera:', error);
          });
      });
    }
  </script>
</body>

</html>
